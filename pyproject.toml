[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "prismpipe"
version = "0.2.0"
description = "Capability-Routed API Pipeline - Requests become the carrier of computation"
readme = "README.md"
requires-python = ">=3.11"
authors = [
    {name = "Deepiri Team", email = "team@deepiri.ai"}
]
license = {text = "MIT"}
keywords = ["api", "pipeline", "capability", "routing", "microservices", "framework"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Application Frameworks",
]

dependencies = [
    "pydantic>=2.0.0",
    "httpx>=0.27.0",
    "structlog>=24.0.0",
    "orjson>=3.10.0",
]

[project.optional-dependencies]
server = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.30.0",
]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.24.0",
    "pytest-cov>=5.0.0",
    "ruff>=0.6.0",
    "mypy>=1.11.0",
    "pre-commit>=4.0.0",
    "black>=24.0.0",
]
all = [
    "pydantic>=2.0.0",
    "httpx>=0.27.0",
    "structlog>=24.0.0",
    "orjson>=3.10.0",
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.30.0",
    "pytest>=8.0.0",
    "pytest-asyncio>=0.24.0",
    "pytest-cov>=5.0.0",
    "ruff>=0.6.0",
    "mypy>=1.11.0",
]

[project.urls]
Homepage = "https://github.com/Team-Deepiri/deepiri-prismpipe"
Repository = "https://github.com/Team-Deepiri/deepiri-prismpipe"
Documentation = "https://docs.deepiri.ai/prismpipe"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
prismpipe = ["py.typed"]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP", "ANN"]
ignore = ["E501", "ANN401"]

[tool.mypy]
python_version = "3.11"
strict = false
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
