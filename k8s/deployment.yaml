apiVersion: apps/v1
kind: Deployment
metadata:
  name: prismpipe
  namespace: prismpipe
  labels:
    app.kubernetes.io/name: prismpipe
    app.kubernetes.io/version: "0.2.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: prismpipe
  template:
    metadata:
      labels:
        app.kubernetes.io/name: prismpipe
        app.kubernetes.io/version: "0.2.0"
    spec:
      containers:
        - name: prismpipe
          image: deepiri/prismpipe:0.2.0
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: prismpipe-config
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
